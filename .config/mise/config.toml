[settings]
experimental = true
lockfile = true
minimum_release_age = "3d"

[tools]
go = "latest"
node = "latest"
npm = "latest"
pnpm = "latest"
python = "latest"
uv = "latest"
just = "latest"
"aqua:tak848/ccgate" = "latest"

[env]
TF_PLUGIN_CACHE_DIR = "{{ env.HOME }}/.terraform.d/plugin-cache"
XDG_CONFIG_HOME = "{{ env.HOME }}/.config"
